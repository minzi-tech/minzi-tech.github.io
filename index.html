<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Majmaʿ al-baḥrayn · minzi-tech</title>
<meta name="description" content="A constellation of instruments — apps built at the meeting of the two seas: data, scholarship, mysticism, and play." />
<style>
  :root{
    --ink:#0e1424; --ink2:#151d33; --paper:#f7f2e6; --edge:#e6dcc4;
    --teal:#3aa39d; --gold:#cf9f43; --rose:#b0506a; --muted:#8a8397; --text:#ece5d3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:
      radial-gradient(1200px 600px at 70% -10%, #1c2745 0%, transparent 60%),
      radial-gradient(900px 500px at 10% 10%, #17223c 0%, transparent 55%),
      var(--ink);
    color:var(--text); font-family:'Iowan Old Style', Georgia, serif;
    min-height:100vh; padding:56px 22px 72px;
  }
  .wrap{max-width:820px; margin:0 auto;}
  header{text-align:center; margin-bottom:48px;}
  .seas{display:inline-flex; align-items:center; gap:12px; margin-bottom:14px;}
  .seas .bar{width:34px; height:3px; border-radius:2px;}
  .seas .t{background:var(--teal);} .seas .g{background:var(--gold);}
  .seas .k{font-size:12px; letter-spacing:3.5px; color:var(--muted); text-transform:uppercase;}
  h1{font-size:34px; margin:0 0 8px; color:#fff; font-weight:600; letter-spacing:.5px;}
  .sub{color:var(--muted); font-size:16px; margin:0; font-style:italic;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:18px;}
  .work{
    display:block; text-decoration:none; color:inherit; position:relative;
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
    border:1px solid rgba(230,220,196,.16); border-radius:16px; padding:22px 22px 20px;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  a.work:hover{transform:translateY(-3px); border-color:rgba(207,159,67,.5);
    box-shadow:0 12px 30px rgba(0,0,0,.35);}
  .work.placeholder{opacity:.6; cursor:default;}
  .work-num{position:absolute; top:16px; right:18px; font-size:12px; color:var(--muted); letter-spacing:1px;}
  .work-glyph{width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    background:rgba(58,163,157,.12); color:var(--teal); margin-bottom:14px;}
  .work h3{margin:0 0 2px; font-size:20px; color:#fff; font-weight:600;}
  .work-ar{font-size:12.5px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:10px;}
  .work p{margin:0; font-size:14px; line-height:1.5; color:var(--text); opacity:.82;}
  .go{display:inline-block; margin-top:14px; font-size:13.5px; color:var(--teal); font-weight:500;}
  .soon{color:var(--muted);}
  footer{margin-top:52px; text-align:center; color:var(--muted); font-size:12.5px; line-height:1.7;}
  footer .glyphline{opacity:.5; letter-spacing:6px; margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="seas">
      <span class="bar t"></span>
      <span class="k">Majmaʿ al-baḥrayn</span>
      <span class="bar g"></span>
    </div>
    <h1>The Meeting of the Two Seas</h1>
    <p class="sub">A constellation of instruments — built where data, scholarship, mysticism, and play converge.</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <div class="glyphline">✦ ✧ ✦</div>
    Built iteratively, held together with intention.<br/>
    minzi-tech.github.io
  </footer>
</div>

<script>
const USERNAME = "minzi-tech";

/* Each work: title, ar (subtitle), blurb, repo, glyph, ready.
   ready:false renders a non-clickable "coming soon" card.
   Set a repo's ready:false if you haven't pushed it yet, to avoid a dead link. */
const WORKS = [
  {
    title: "Majma\u02bf Library",
    ar: "A Mystical Library",
    blurb: "A personal library for comparative mysticism and scholarship \u2014 wiki-style concept linking across traditions, from Ibn Arabi's science of letters to Indo-Iranian cosmology.",
    repo: "majma-library",
    glyph: "book",
    ready: true,
  },
  {
    title: "The Volvelle",
    ar: "A Spirit-Board Instrument",
    blurb: "An interactive volvelle drawing on Enochian letters, Ibn Arabi's science of letters, hijaz-scale pitch, and astrolabe mechanics \u2014 a divinatory dial for the iPad.",
    repo: "volvelle",
    glyph: "compass",
    ready: true,
  },
  {
    title: "Unicorn Job Finder",
    ar: "A Job Command Center",
    blurb: "Surfaces only the roles that assemble a whole interdisciplinary self. Tunes searches to a dream-job wireframe rather than a job title, points to the networks where rare roles actually circulate, and scores each opening by how close to unicorn it is.",
    repo: "unicorn",
    glyph: "star",
    ready: true,
  },
  {
    title: "Rollies \u00b7 Homebrew",
    ar: "A Campaign Roll Ledger",
    blurb: "A dice tracker for the homebrew campaign \u2014 twenty rolls per player per session, with live per-player statistics and head-to-head comparison across the table.",
    repo: "rollies-nerdy",
    glyph: "dice",
    ready: true,
  },
  {
    title: "Rollies \u00b7 Strahd",
    ar: "A Ravenloft Roll Ledger",
    blurb: "The same roll-tracking engine tuned for the Strahd game \u2014 twenty rolls per player per session, up-to-date statistics, and player-versus-player comparison, skinned for the mists of Barovia.",
    repo: "rollies-strahd",
    glyph: "dice",
    ready: true,
  },
];

const GLYPHS = {
  book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  compass: '<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>',
  dice: '<rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.2" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.2" fill="currentColor"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/>',
  star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
};

function hrefFor(w){
  if(w.url) return w.url;
  if(!w.ready) return null;
  return "https://" + USERNAME + ".github.io/" + w.repo + "/";
}

const grid = document.getElementById("grid");
WORKS.forEach(function(w, i){
  const href = hrefFor(w);
  const tag = href ? "a" : "div";
  const el = document.createElement(tag);
  el.className = "work" + (w.ready ? "" : " placeholder");
  if(href) el.href = href;
  const glyph = GLYPHS[w.glyph] || GLYPHS.star;
  el.innerHTML =
    '<span class="work-num">' + String(i+1).padStart(2,"0") + '</span>' +
    '<div class="work-glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + glyph + '</svg></div>' +
    '<h3>' + w.title + '</h3>' +
    '<div class="work-ar">' + (w.ar || "") + '</div>' +
    '<p>' + w.blurb + '</p>' +
    '<span class="go ' + (w.ready ? "" : "soon") + '">' + (w.ready ? "Open \u2192" : "Coming soon") + '</span>';
  grid.appendChild(el);
});
</script>
</body>
</html>
